<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" fill="#fff7ed"/>
  <circle cx="254" cy="22" r="50" fill="#f97316" opacity=".09"/>
  <circle cx="14" cy="164" r="44" fill="#f59e0b" opacity=".07"/>
  <!-- chart grid lines -->
  <line x1="34" y1="148" x2="246" y2="148" stroke="#fed7aa" stroke-width="1"/>
  <line x1="34" y1="124" x2="246" y2="124" stroke="#fed7aa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="34" y1="100" x2="246" y2="100" stroke="#fed7aa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="34" y1="76"  x2="246" y2="76"  stroke="#fed7aa" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- axis -->
  <line x1="34" y1="148" x2="34" y2="56"  stroke="#fdba74" stroke-width="1.5" stroke-linecap="round"/>
  <!-- bar chart bars -->
  <rect x="46"  y="122" width="22" height="26" rx="4" fill="#f97316" opacity=".4"/>
  <rect x="78"  y="112" width="22" height="36" rx="4" fill="#f97316" opacity=".5"/>
  <rect x="110" y="100" width="22" height="48" rx="4" fill="#f97316" opacity=".6"/>
  <rect x="142" y="88"  width="22" height="60" rx="4" fill="#f97316" opacity=".75"/>
  <rect x="174" y="74"  width="22" height="74" rx="4" fill="#f97316" opacity=".88"/>
  <rect x="206" y="60"  width="22" height="88" rx="4" fill="#f97316"/>
  <!-- trend line -->
  <polyline points="57,122 89,110 121,98 153,84 185,70 217,56" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- trend dots -->
  <circle cx="57"  cy="122" r="4" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="89"  cy="110" r="4" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="121" cy="98"  r="4" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="153" cy="84"  r="4" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="185" cy="70"  r="4" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="217" cy="56"  r="5" fill="#f97316" stroke="#fff" stroke-width="2"/>
  <!-- search bar floating on top -->
  <rect x="54" y="18" width="172" height="34" rx="17" fill="#fff" stroke="#fed7aa" stroke-width="1.5" filter="url(#seo-sh)"/>
  <!-- magnifier inside -->
  <circle cx="78" cy="35" r="9" stroke="#f97316" stroke-width="2" fill="none"/>
  <line x1="84" y1="41" x2="90" y2="47" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <!-- search text lines -->
  <rect x="96"  y="31" width="60" height="6" rx="3" fill="#f97316" opacity=".35"/>
  <rect x="96"  y="38" width="40" height="5" rx="2" fill="#94a3b8" opacity=".3"/>
  <!-- top result badge -->
  <rect x="170" y="26" width="46" height="18" rx="9" fill="#f97316"/>
  <rect x="178" y="31" width="30" height="5" rx="2" fill="#fff" opacity=".8"/>
  <!-- up arrow badge -->
  <rect x="206" y="120" width="34" height="20" rx="10" fill="#fff" stroke="#fed7aa" stroke-width="1.5"/>
  <path d="M216 132 L223 124 L230 132" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <defs>
    <filter id="seo-sh" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f97316" flood-opacity=".15"/>
    </filter>
  </defs>
</svg>
