<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" fill="#ecfdf5"/>
  <circle cx="254" cy="22" r="50" fill="#10b981" opacity=".09"/>
  <circle cx="14" cy="162" r="44" fill="#14b8a6" opacity=".07"/>
  <!-- product cards row (background) -->
  <rect x="28" y="94" width="68" height="70" rx="8" fill="#fff" stroke="#d1fae5" stroke-width="1.5"/>
  <rect x="106" y="84" width="68" height="80" rx="8" fill="#fff" stroke="#d1fae5" stroke-width="1.5"/>
  <rect x="184" y="94" width="68" height="70" rx="8" fill="#fff" stroke="#d1fae5" stroke-width="1.5"/>
  <!-- product image placeholders -->
  <rect x="32" y="98" width="60" height="36" rx="5" fill="#d1fae5"/>
  <circle cx="62" cy="116" r="12" fill="#10b981" opacity=".35"/>
  <rect x="110" y="88" width="60" height="40" rx="5" fill="#d1fae5"/>
  <circle cx="140" cy="108" r="14" fill="#10b981" opacity=".45"/>
  <rect x="188" y="98" width="60" height="36" rx="5" fill="#d1fae5"/>
  <circle cx="218" cy="116" r="12" fill="#10b981" opacity=".35"/>
  <!-- product price lines -->
  <rect x="36" y="141" width="32" height="6" rx="3" fill="#10b981" opacity=".7"/>
  <rect x="36" y="153" width="22" height="5" rx="2" fill="#94a3b8" opacity=".4"/>
  <rect x="114" y="135" width="32" height="6" rx="3" fill="#10b981" opacity=".8"/>
  <rect x="114" y="147" width="22" height="5" rx="2" fill="#94a3b8" opacity=".4"/>
  <rect x="192" y="141" width="32" height="6" rx="3" fill="#10b981" opacity=".7"/>
  <rect x="192" y="153" width="22" height="5" rx="2" fill="#94a3b8" opacity=".4"/>
  <!-- "add to cart" mini buttons -->
  <rect x="60" y="150" width="30" height="12" rx="6" fill="#10b981" opacity=".8"/>
  <rect x="138" y="144" width="30" height="12" rx="6" fill="#10b981"/>
  <rect x="216" y="150" width="30" height="12" rx="6" fill="#10b981" opacity=".8"/>
  <!-- big shopping bag -->
  <g transform="translate(96,12)">
    <!-- bag body -->
    <rect x="4" y="20" width="52" height="44" rx="8" fill="#10b981"/>
    <!-- bag handle -->
    <path d="M16 20 C16 10 44 10 44 20" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7"/>
    <!-- lock icon on bag -->
    <rect x="23" y="33" width="14" height="12" rx="2" fill="#fff" opacity=".25"/>
    <path d="M27 33 C27 28 37 28 37 33" stroke="#fff" stroke-width="2" fill="none" opacity=".5"/>
    <!-- sparkle decorations -->
  </g>
  <!-- sparkles around bag -->
  <circle cx="86" cy="22" r="5" fill="#10b981" opacity=".5"/>
  <circle cx="194" cy="34" r="4" fill="#14b8a6" opacity=".5"/>
  <circle cx="162" cy="18" r="3" fill="#10b981" opacity=".4"/>
  <line x1="82" y1="14" x2="82" y2="8" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <line x1="79" y1="11" x2="85" y2="11" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <line x1="196" y1="28" x2="196" y2="22" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <line x1="193" y1="25" x2="199" y2="25" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <!-- floating badge -->
  <rect x="156" y="52" width="60" height="22" rx="11" fill="#fff" stroke="#d1fae5" stroke-width="1.5"/>
  <circle cx="170" cy="63" r="6" fill="#10b981"/>
  <rect x="180" y="59" width="28" height="5" rx="2" fill="#10b981" opacity=".5"/>
  <rect x="180" y="66" width="20" height="4" rx="2" fill="#94a3b8" opacity=".4"/>
