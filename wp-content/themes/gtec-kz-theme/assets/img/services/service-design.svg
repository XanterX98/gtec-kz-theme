<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" fill="#fff0f6"/>
  <circle cx="256" cy="20" r="50" fill="#ec4899" opacity=".08"/>
  <circle cx="12" cy="162" r="44" fill="#f43f5e" opacity=".07"/>
  <!-- artboard shadow -->
  <rect x="48" y="34" width="186" height="122" rx="10" fill="#ec4899" opacity=".10"/>
  <!-- artboard -->
  <rect x="44" y="28" width="186" height="122" rx="10" fill="#fff" stroke="#fce7f3" stroke-width="1.5"/>
  <!-- artboard top bar -->
  <rect x="44" y="28" width="186" height="22" rx="10" fill="#fdf2f8"/>
  <rect x="44" y="40" width="186" height="10" fill="#fdf2f8"/>
  <rect x="54" y="34" width="48" height="10" rx="5" fill="#ec4899" opacity=".25"/>
  <!-- layers panel -->
  <rect x="44" y="50" width="46" height="100" fill="#fdf2f8"/>
  <rect x="52" y="62" width="30" height="7" rx="3" fill="#ec4899" opacity=".45"/>
  <rect x="52" y="75" width="30" height="7" rx="3" fill="#f43f5e" opacity=".32"/>
  <rect x="52" y="88" width="30" height="7" rx="3" fill="#ec4899" opacity=".30"/>
  <rect x="52" y="101" width="30" height="7" rx="3" fill="#f43f5e" opacity=".25"/>
  <!-- canvas: large rect shape with selection handles -->
  <rect x="106" y="58" width="70" height="46" rx="6" fill="#ec4899" opacity=".18"/>
  <rect x="106" y="58" width="70" height="46" rx="6" stroke="#ec4899" stroke-width="1.5" opacity=".55"/>
  <!-- selection handles -->
  <rect x="103" y="55" width="7" height="7" rx="1.5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="173" y="55" width="7" height="7" rx="1.5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="103" y="97" width="7" height="7" rx="1.5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="173" y="97" width="7" height="7" rx="1.5" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <!-- canvas: circle shape -->
  <circle cx="206" cy="76" r="22" fill="#f43f5e" opacity=".15"/>
  <circle cx="206" cy="76" r="22" stroke="#f43f5e" stroke-width="1.5" opacity=".5"/>
  <!-- canvas: triangle shape (single opacity) -->
  <polygon points="122,120 142,92 162,120" fill="#ec4899" opacity=".22" stroke="#ec4899" stroke-width="1.2"/>
  <!-- colour swatches -->
  <circle cx="104" cy="138" r="9" fill="#ec4899"/>
  <circle cx="124" cy="138" r="9" fill="#f43f5e"/>
  <circle cx="144" cy="138" r="9" fill="#f9a8d4"/>
  <circle cx="164" cy="138" r="9" fill="#fb7185"/>
  <circle cx="184" cy="138" r="9" fill="#fda4af"/>
  <!-- pen tool -->
  <g transform="translate(222,100) rotate(-20)">
    <rect x="0" y="10" width="8" height="22" rx="3" fill="#ec4899" opacity=".75"/>
    <polygon points="4,32 0,42 8,42" fill="#f43f5e" opacity=".85"/>
    <rect x="0" y="0" width="8" height="12" rx="3" fill="#f43f5e"/>
  </g>
</svg>
