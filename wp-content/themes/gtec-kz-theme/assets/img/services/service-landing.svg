<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" fill="#eff6ff"/>
  <circle cx="254" cy="24" r="52" fill="#3b82f6" opacity=".08"/>
  <circle cx="16" cy="162" r="44" fill="#06b6d4" opacity=".07"/>
  <!-- stars -->
  <circle cx="48" cy="38" r="2.5" fill="#3b82f6" opacity=".5"/>
  <circle cx="236" cy="52" r="2"   fill="#06b6d4" opacity=".5"/>
  <circle cx="68"  cy="62" r="1.5" fill="#3b82f6" opacity=".4"/>
  <circle cx="218" cy="30" r="2"   fill="#3b82f6" opacity=".4"/>
  <circle cx="260" cy="80" r="1.5" fill="#06b6d4" opacity=".4"/>
  <circle cx="24"  cy="96" r="2"   fill="#3b82f6" opacity=".35"/>
  <!-- landing page wireframe (background) -->
  <rect x="32" y="86" width="216" height="84" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.5"/>
  <!-- wireframe nav -->
  <rect x="32" y="86" width="216" height="18" rx="8" fill="#dbeafe"/>
  <rect x="32" y="96" width="216" height="8" fill="#dbeafe"/>
  <rect x="40" y="90" width="30" height="8" rx="4" fill="#3b82f6" opacity=".4"/>
  <rect x="166" y="90" width="18" height="8" rx="4" fill="#94a3b8" opacity=".3"/>
  <rect x="188" y="90" width="18" height="8" rx="4" fill="#94a3b8" opacity=".3"/>
  <rect x="210" y="88" width="30" height="12" rx="6" fill="#3b82f6" opacity=".6"/>
  <!-- wireframe hero text lines -->
  <rect x="44" y="114" width="90" height="9" rx="4" fill="#3b82f6" opacity=".3"/>
  <rect x="44" y="128" width="70" height="7" rx="3" fill="#94a3b8" opacity=".25"/>
  <rect x="44" y="140" width="50" height="7" rx="3" fill="#94a3b8" opacity=".2"/>
  <!-- wireframe cta button -->
  <rect x="44" y="154" width="52" height="14" rx="7" fill="#3b82f6" opacity=".55"/>
  <!-- wireframe hero image placeholder -->
  <rect x="162" y="108" width="76" height="58" rx="6" fill="#dbeafe"/>
  <rect x="174" y="120" width="52" height="34" rx="4" fill="#3b82f6" opacity=".2"/>
  <!-- rocket -->
  <g transform="translate(130,8)">
    <!-- flame -->
    <ellipse cx="12" cy="62" rx="6" ry="10" fill="#f97316" opacity=".8"/>
    <ellipse cx="12" cy="60" rx="4" ry="7"  fill="#fbbf24" opacity=".9"/>
    <!-- body -->
    <rect x="4" y="22" width="16" height="36" rx="8" fill="#3b82f6"/>
    <!-- nose cone -->
    <path d="M4 22 Q4 8 12 4 Q20 8 20 22 Z" fill="#2563eb"/>
    <!-- fins -->
    <path d="M4 52 L0 64 L8 56 Z"  fill="#2563eb"/>
    <path d="M20 52 L24 64 L16 56 Z" fill="#2563eb"/>
    <!-- window -->
    <circle cx="12" cy="32" r="5" fill="#bfdbfe"/>
    <circle cx="12" cy="32" r="3" fill="#dbeafe"/>
  </g>
  <!-- exhaust trail dots -->
  <circle cx="142" cy="76"  r="3.5" fill="#3b82f6"  opacity=".30"/>
  <circle cx="142" cy="84"  r="2.5" fill="#06b6d4"  opacity=".25"/>
  <circle cx="142" cy="90"  r="1.5" fill="#3b82f6"  opacity=".18"/>
  <!-- speed lines -->
  <line x1="108" y1="44" x2="118" y2="44" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity=".4"/>
  <line x1="104" y1="52" x2="116" y2="52" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
  <line x1="160" y1="36" x2="172" y2="36" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity=".4"/>
  <line x1="164" y1="44" x2="174" y2="44" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
</svg>
