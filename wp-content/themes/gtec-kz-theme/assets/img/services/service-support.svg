<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" fill="#faf5ff"/>
  <circle cx="254" cy="22" r="50" fill="#8b5cf6" opacity=".09"/>
  <circle cx="14" cy="162" r="44" fill="#6366f1" opacity=".07"/>
  <!-- left chat bubble (operator) -->
  <rect x="28" y="28" width="148" height="58" rx="14" fill="#8b5cf6"/>
  <path d="M42 86 L30 100 L56 86 Z" fill="#8b5cf6"/>
  <!-- operator avatar -->
  <circle cx="50" cy="54" r="18" fill="#6d28d9"/>
  <circle cx="50" cy="48" r="8"  fill="#ede9fe" opacity=".6"/>
  <ellipse cx="50" cy="66" rx="12" ry="7" fill="#ede9fe" opacity=".35"/>
  <!-- headset arc -->
  <path d="M34 50 Q34 32 50 32 Q66 32 66 50" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <rect x="30" y="48" width="8" height="12" rx="4" fill="#c4b5fd"/>
  <rect x="62" y="48" width="8" height="12" rx="4" fill="#c4b5fd"/>
  <!-- operator message lines -->
  <rect x="76" y="44" width="82" height="7" rx="3.5" fill="#fff" opacity=".75"/>
  <rect x="76" y="57" width="62" height="7" rx="3.5" fill="#fff" opacity=".5"/>
  <!-- right chat bubble (client) -->
  <rect x="104" y="108" width="148" height="48" rx="14" fill="#fff" stroke="#e9d5ff" stroke-width="1.5"/>
  <path d="M238 156 L252 168 L226 156 Z" fill="#fff" stroke="#e9d5ff" stroke-width="1.5"/>
  <!-- client message lines -->
  <rect x="118" y="122" width="88" height="7" rx="3.5" fill="#8b5cf6" opacity=".35"/>
  <rect x="118" y="135" width="64" height="7" rx="3.5" fill="#94a3b8" opacity=".3"/>
  <!-- floating check badge -->
  <rect x="186" y="22" width="64" height="34" rx="12" fill="#fff" stroke="#e9d5ff" stroke-width="1.5"/>
  <circle cx="205" cy="39" r="9" fill="#8b5cf6"/>
  <polyline points="200,39 204,43 211,34" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="218" y="33" width="26" height="6" rx="3" fill="#8b5cf6" opacity=".4"/>
  <rect x="218" y="41" width="18" height="5" rx="2" fill="#94a3b8" opacity=".3"/>
  <!-- small decorative dots -->
  <circle cx="88"  cy="100" r="5" fill="#8b5cf6" opacity=".25"/>
  <circle cx="100" cy="108" r="3" fill="#6366f1" opacity=".2"/>
  <circle cx="78"  cy="110" r="4" fill="#8b5cf6" opacity=".2"/>
  <!-- notification dots on bubble -->
  <circle cx="162" cy="45" r="5" fill="#fff" opacity=".5"/>
  <circle cx="176" cy="45" r="5" fill="#fff" opacity=".5"/>
  <circle cx="190" cy="45" r="5" fill="#fff" opacity=".5"/>
</svg>
