<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <!-- Background -->
  <rect width="400" height="240" fill="#eff6ff"/>
  <!-- Decorative blobs -->
  <circle cx="358" cy="28"  r="66" fill="#3b82f6" opacity=".07"/>
  <circle cx="22"  cy="218" r="54" fill="#2563eb" opacity=".06"/>

  <!-- Floating graduation cap -->
  <g transform="translate(318,18)" opacity=".55">
    <rect x="0" y="10" width="36" height="6"  rx="3" fill="#2563eb"/>
    <polygon points="18,0 36,10 18,20 0,10" fill="#3b82f6"/>
    <line x1="34" y1="10" x2="34" y2="24" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
    <circle cx="34" cy="26" r="3" fill="#2563eb"/>
  </g>

  <!-- Browser shadow -->
  <rect x="52" y="30" width="300" height="190" rx="12" fill="#2563eb" opacity=".09"/>
  <!-- Browser window -->
  <rect x="48" y="24" width="300" height="190" rx="12" fill="#fff" stroke="#bfdbfe" stroke-width="1.5"/>

  <!-- Browser bar -->
  <rect x="48" y="24" width="300" height="32" rx="12" fill="#1d4ed8"/>
  <rect x="48" y="44"  width="300" height="12" fill="#1d4ed8"/>
  <circle cx="68"  cy="40" r="5" fill="#fff" opacity=".3"/>
  <circle cx="84"  cy="40" r="5" fill="#fff" opacity=".3"/>
  <circle cx="100" cy="40" r="5" fill="#fff" opacity=".3"/>
  <rect x="118" y="30" width="148" height="20" rx="10" fill="#fff" opacity=".18"/>
  <rect x="126" y="36" width="88"  height="8"  rx="4"  fill="#fff" opacity=".5"/>

  <!-- Site nav bar -->
  <rect x="48" y="56" width="300" height="32" fill="#1e40af"/>
  <!-- Nav logo -->
  <rect x="62"  y="66" width="52" height="10" rx="5" fill="#fff" opacity=".7"/>
  <!-- Nav links -->
  <rect x="134" y="67" width="26" height="7" rx="3" fill="#fff" opacity=".35"/>
  <rect x="166" y="67" width="34" height="7" rx="3" fill="#fff" opacity=".35"/>
  <rect x="206" y="67" width="26" height="7" rx="3" fill="#fff" opacity=".35"/>
  <rect x="238" y="67" width="30" height="7" rx="3" fill="#fff" opacity=".35"/>
  <!-- Nav CTA -->
  <rect x="298" y="63" width="40" height="18" rx="9" fill="#60a5fa"/>

  <!-- Hero strip -->
  <rect x="48" y="88" width="300" height="52" fill="#dbeafe"/>
  <!-- Hero quote line -->
  <rect x="64" y="100" width="5" height="28" rx="2.5" fill="#3b82f6" opacity=".7"/>
  <rect x="76"  y="100" width="130" height="9" rx="4" fill="#1d4ed8" opacity=".5"/>
  <rect x="76"  y="114" width="108" height="7" rx="3" fill="#1d4ed8" opacity=".32"/>
  <rect x="76"  y="125" width="88"  height="7" rx="3" fill="#1d4ed8" opacity=".25"/>
  <!-- Hero badge -->
  <rect x="224" y="96" width="116" height="36" rx="8" fill="#bfdbfe"/>
  <circle cx="256" cy="114" r="14" fill="#3b82f6" opacity=".5"/>
  <!-- Play button -->
  <polygon points="252,108 252,120 264,114" fill="#fff" opacity=".9"/>

  <!-- Course cards row -->
  <rect x="56"  y="150" width="84" height="52" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="152" y="150" width="84" height="52" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="248" y="150" width="84" height="52" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>

  <!-- Card thumbnails -->
  <rect x="56"  y="150" width="84" height="26" rx="8" fill="#bfdbfe"/>
  <rect x="152" y="150" width="84" height="26" rx="8" fill="#93c5fd"/>
  <rect x="248" y="150" width="84" height="26" rx="8" fill="#bfdbfe"/>
  <!-- Rounded bottom corners override -->
  <rect x="56"  y="164" width="84" height="12" fill="#bfdbfe"/>
  <rect x="152" y="164" width="84" height="12" fill="#93c5fd"/>
  <rect x="248" y="164" width="84" height="12" fill="#bfdbfe"/>
  <!-- Play icons on thumbnails -->
  <circle cx="98"  cy="163" r="8" fill="#1d4ed8" opacity=".6"/>
  <circle cx="194" cy="163" r="8" fill="#1d4ed8" opacity=".6"/>
  <circle cx="290" cy="163" r="8" fill="#1d4ed8" opacity=".6"/>
  <polygon points="95,159 95,167 103,163" fill="#fff" opacity=".9"/>
  <polygon points="191,159 191,167 199,163" fill="#fff" opacity=".9"/>
  <polygon points="287,159 287,167 295,163" fill="#fff" opacity=".9"/>
  <!-- Card text -->
  <rect x="62"  y="182" width="54" height="6" rx="3" fill="#1d4ed8" opacity=".4"/>
  <rect x="158" y="182" width="54" height="6" rx="3" fill="#1d4ed8" opacity=".4"/>
  <rect x="254" y="182" width="54" height="6" rx="3" fill="#1d4ed8" opacity=".4"/>
  <rect x="62"  y="192" width="40" height="5" rx="2" fill="#94a3b8" opacity=".4"/>
  <rect x="158" y="192" width="40" height="5" rx="2" fill="#94a3b8" opacity=".4"/>
  <rect x="254" y="192" width="40" height="5" rx="2" fill="#94a3b8" opacity=".4"/>

  <!-- Zoom badge -->
  <rect x="270" y="108" width="68" height="22" rx="11" fill="#2563eb" filter="url(#edush)"/>
  <rect x="280" y="115" width="48" height="8" rx="4" fill="#fff" opacity=".75"/>

  <defs>
    <filter id="edush" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2563eb" flood-opacity=".3"/>
    </filter>
  </defs>
</svg>
